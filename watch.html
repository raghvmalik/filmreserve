<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FilmReserve - Watch</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      background-color: #111;
      opacity: 0.95;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 999;
    }

    .navbar a {
      text-decoration: none;
      color: #ccc;
    }

    .watch-container {
      flex: 1;
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 174, 255, 0.2);
    }

    #movieTitle {
      font-size: 28px;
      margin-bottom: 15px;
    }

    .btn {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      background: #601EF9;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0047AB;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }

    .footer {
      text-align: center;
      padding: 12px;
      font-size: 13px;
      color: #aaa;
      background: #000;
      margin-top: auto;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="index.html">🎬 FilmReserve</a>
</div>

<div class="watch-container">
  <div class="card">
    <h1 id="movieTitle">Loading...</h1>

    <button class="btn" id="playBtn">▶ Play</button>

    <div class="hint" id="hintText">
      Redirecting to streaming platform...
    </div>
  </div>
</div>

<div class="footer">
  FilmReserve | Smart streaming navigator
</div>

<script>
  // 🎬 YOUR MOVIE DATABASE (Hotstar + YouTube)
  const watchData = {
    oppenheimer: {
      title: "Oppenheimer",
      src: "https://www.hotstar.com/in/movies/oppenheimer/1971011128/watch"
    },
    interstellar: {
      title: "Interstellar",
      src: "https://www.hotstar.com/in/movies/interstellar/1971000531/watch"
    },
    inception: {
      title: "Inception",
      src: "https://www.hotstar.com/in/movies/inception/1971000530/watch"
    },
    minecraft: {
      title: "Minecraft",
      src: "https://www.hotstar.com/in/movies/a-minecraft-movie/1271443009/watch"
    },
    wicked: {
      title: "Wicked",
      src: "https://www.hotstar.com/in/movies/wicked-for-good/1271547081/watch"
    },
    "spiderman-nwh": {
      title: "Spider-Man: No Way Home",
      src: "https://www.hotstar.com/in/movies/the-amazing-spider-man-2/1271644422/watch"
    },
    dune: {
      title: "Dune (Trailer)",
      src: "https://youtu.be/3_9vCamtuPY"
    }
  };

  const params = new URLSearchParams(window.location.search);
  const movieKey = params.get("movie");

  const titleEl = document.getElementById("movieTitle");
  const playBtn = document.getElementById("playBtn");

  let currentMovie = null;

  if (movieKey && watchData[movieKey.toLowerCase()]) {
    currentMovie = watchData[movieKey.toLowerCase()];
    titleEl.textContent = currentMovie.title;
  } else {
    titleEl.textContent = "Movie not found";
    playBtn.disabled = true;
    playBtn.style.opacity = "0.5";
  }

  playBtn.addEventListener("click", () => {
    if (!currentMovie) return;

    // 🚀 redirect to Hotstar / YouTube
    window.open(currentMovie.src, "_blank");
  });
</script>

</body>
</html>
